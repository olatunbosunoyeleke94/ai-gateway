version: "3.8"

services:

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped


  ollama:
    image: ollama/ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama:/root/.ollama
    restart: unless-stopped


  llm-gateway:
    image: llm-gateway:latest
    expose:
      - "3000"
    environment:
      - REDIS_URL=redis://redis:6379
      - OLLAMA_URL=http://ollama:11434
      - INSTANCE_NAME=${HOSTNAME}
    depends_on:
      - redis
      - ollama
    restart: unless-stopped
    deploy:
      replicas: 3


  nginx:
    image: nginx:alpine
    ports:
      - "2194:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - llm-gateway
    restart: unless-stopped


  prometheus:
    image: prom/prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    restart: unless-stopped


  grafana:
    image: grafana/grafana
    ports:
      - "3001:3000"
    depends_on:
      - prometheus
    restart: unless-stopped


  otel-collector:
    image: otel/opentelemetry-collector
    command:
      - "--config=/etc/otel.yaml"
    volumes:
      - ./otel-collector-config.yaml:/etc/otel.yaml
    ports:
      - "4318:4318"
    restart: unless-stopped


volumes:

  redis_data:
  ollama:
